name: Build and Deploy to Sandbox  
on:   
  push:     
    branches: [ master ]   
  pull_request:     
    branches: [ master ]      

jobs:   
  build:     
    runs-on: ubuntu-latest     
    steps:     
    - name: Checkout this repo       
      uses: actions/checkout@v4     
    - name: Cache dependencies       
      uses: actions/cache@v4       
      with:         
        path: ~/.m2/repository         
        key: ${{ runner.os }}-maven-${{ hashFiles('**/pom.xml') }}         
        restore-keys: |           
          ${{ runner.os }}-maven-     
    - name: Set up JDK 1.8       
      uses: actions/setup-java@v4       
      with:         
        distribution: 'zulu'         
        java-version: 8  
    - name: Configure Maven settings
      run: |
        mkdir -p ~/.m2
        echo "<settings>
          <servers>
            <server>
              <id>anypoint-exchange-v3</id>
              <username>${{ secrets.ANYPOINT_PLATFORM_USERNAME }}</username>
              <password>${{ secrets.ANYPOINT_PLATFORM_PASSWORD }}</password>
            </server>
          </servers>
        </settings>" > ~/.m2/settings.xml
    - name: Build with Maven  
      run: mvn -B clean package --file pom.xml
    - name: Upload artifact        
      uses: actions/upload-artifact@v4       
      with:           
        name: artifacts           
        path: target/*.jar            

  deploy:     
    needs: build     
    runs-on: ubuntu-latest     
    steps:         
    - name: Checkout this repo       
      uses: actions/checkout@v4     
    - name: Set up JDK 1.8       
      uses: actions/setup-java@v4       
      with:         
        distribution: 'zulu'         
        java-version: 8
    - name: Cache dependencies       
      uses: actions/cache@v4       
      with:         
        path: ~/.m2/repository         
        key: ${{ runner.os }}-maven-${{ hashFiles('**/pom.xml') }}         
        restore-keys: |           
          ${{ runner.os }}-maven-     
    - name: Download artifacts
      uses: actions/download-artifact@v4       
      with:         
        name: artifacts
        path: target/
    - name: Configure Maven settings
      run: |
        mkdir -p ~/.m2
        echo "<settings>
          <servers>
            <server>
              <id>anypoint-exchange-v3</id>
              <username>${{ secrets.ANYPOINT_PLATFORM_USERNAME }}</username>
              <password>${{ secrets.ANYPOINT_PLATFORM_PASSWORD }}</password>
            </server>
          </servers>
        </settings>" > ~/.m2/settings.xml
    
    # Método 1: Borrar aplicación con curl y autenticación básica
    - name: Borrar aplicación existente (método simple)
      run: |
        echo "Intentando borrar la aplicación existente..."
        RESULTADO=$(curl -s -u "${{ secrets.ANYPOINT_PLATFORM_USERNAME }}:${{ secrets.ANYPOINT_PLATFORM_PASSWORD }}" \
          -X DELETE \
          -w "\n%{http_code}" \
          "https://anypoint.mulesoft.com/cloudhub/api/v2/organizations/153b0d20-821e-4f82-b36a-7e0e28e44a93/environments/e5d7feb4-a658-436e-8915-5c79b9e15da9/applications/s-test-svalerdos")
        
        # Extraer código HTTP
        HTTP_CODE=$(echo "$RESULTADO" | tail -n1)
        
        # Verificar resultado
        if [ "$HTTP_CODE" == "204" ] || [ "$HTTP_CODE" == "200" ]; then
          echo "✅ Aplicación borrada correctamente"
          echo "Esperando 20 segundos para asegurar que se complete el borrado..."
          sleep 20
        elif [ "$HTTP_CODE" == "404" ]; then
          echo "ℹ️ La aplicación no existe o ya fue borrada"
        else
          echo "⚠️ Error al borrar la aplicación: HTTP $HTTP_CODE"
          echo "Respuesta: $(echo "$RESULTADO" | head -n -1)"
          echo "Continuando con el despliegue de todos modos..."
        fi
    
    # Método 2 (alternativo): Usar el plugin de Maven para borrar
    # - name: Borrar aplicación con Maven
    #   continue-on-error: true
    #   run: |
    #     echo "Intentando borrar la aplicación existente con Maven..."
    #     mvn mule:undeploy -Dmule.artifact.name=s-test-svalerdos \
    #     -Danypoint.username="${{ secrets.ANYPOINT_PLATFORM_USERNAME }}" \
    #     -Danypoint.password="${{ secrets.ANYPOINT_PLATFORM_PASSWORD }}" \
    #     -Danypoint.platform.gatekeeper=false \
    #     -Danypoint.environment=Sandbox \
    #     -Dcloudhub.application=s-test-svalerdos
    
    # Desplegar nueva aplicación
    - name: Desplegar a Sandbox
      run: |
        echo "Desplegando aplicación..."
        mvn deploy -DmuleDeploy -DskipDeploymentVerification=true \
        -DskipMuleVersionCompatibilityCheck=true \
        -Dmule.artifact.deploy.muleVersion=4.6.0 \
        -Danypoint.username="${{ secrets.ANYPOINT_PLATFORM_USERNAME }}" \
        -Danypoint.password="${{ secrets.ANYPOINT_PLATFORM_PASSWORD }}" \
        -Dencryption.key="${{ secrets.ENCRYPTION_KEY }}"