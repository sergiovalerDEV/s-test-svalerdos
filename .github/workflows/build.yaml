name: Build and Deploy to Sandbox  
on:   
  push:     
    branches: [ master ]   
  pull_request:     
    branches: [ master ]      

jobs:   
  build:     
    runs-on: ubuntu-latest     
    steps:     
    - name: Checkout this repo       
      uses: actions/checkout@v4     
    - name: Cache dependencies       
      uses: actions/cache@v4       
      with:         
        path: ~/.m2/repository         
        key: ${{ runner.os }}-maven-${{ hashFiles('**/pom.xml') }}         
        restore-keys: |           
          ${{ runner.os }}-maven-     
    - name: Set up JDK 1.8       
      uses: actions/setup-java@v4       
      with:         
        distribution: 'zulu'         
        java-version: 8  
    - name: Configure Maven settings
      run: |
        mkdir -p ~/.m2
        echo "<settings>
          <servers>
            <server>
              <id>anypoint-exchange-v3</id>
              <username>${{ secrets.ANYPOINT_PLATFORM_USERNAME }}</username>
              <password>${{ secrets.ANYPOINT_PLATFORM_PASSWORD }}</password>
            </server>
          </servers>
        </settings>" > ~/.m2/settings.xml
    - name: Build with Maven  
      run: mvn -B clean package --file pom.xml
    - name: Upload artifact        
      uses: actions/upload-artifact@v4       
      with:           
        name: artifacts           
        path: target/*.jar            

  deploy:     
    needs: build     
    runs-on: ubuntu-latest     
    steps:         
    - name: Checkout this repo       
      uses: actions/checkout@v4     
    - name: Set up JDK 1.8       
      uses: actions/setup-java@v4       
      with:         
        distribution: 'zulu'         
        java-version: 8
    - name: Cache dependencies       
      uses: actions/cache@v4       
      with:         
        path: ~/.m2/repository         
        key: ${{ runner.os }}-maven-${{ hashFiles('**/pom.xml') }}         
        restore-keys: |           
          ${{ runner.os }}-maven-     
    - name: Download artifacts
      uses: actions/download-artifact@v4       
      with:         
        name: artifacts
        path: target/
    - name: Configure Maven settings
      run: |
        mkdir -p ~/.m2
        echo "<settings>
          <servers>
            <server>
              <id>anypoint-exchange-v3</id>
              <username>${{ secrets.ANYPOINT_PLATFORM_USERNAME }}</username>
              <password>${{ secrets.ANYPOINT_PLATFORM_PASSWORD }}</password>
            </server>
          </servers>
        </settings>" > ~/.m2/settings.xml
    
    # Borrar la aplicación desplegada en Runtime Manager
    - name: Borrar aplicación en Runtime Manager
      run: |
        echo "Borrando la aplicación desplegada en Runtime Manager..."
        
        # Para Cloudhub 2.0 (RTF)
        RESULTADO=$(curl -s -u "${{ secrets.ANYPOINT_PLATFORM_USERNAME }}:${{ secrets.ANYPOINT_PLATFORM_PASSWORD }}" \
          -X DELETE \
          -w "\n%{http_code}" \
          "https://anypoint.mulesoft.com/cloudhub/api/v2/organizations/153b0d20-821e-4f82-b36a-7e0e28e44a93/environments/e5d7feb4-a658-436e-8915-5c79b9e15da9/applications/s-test-svalerdos")
        
        # Extraer código HTTP
        HTTP_CODE=$(echo "$RESULTADO" | tail -n1)
        
        # Verificar resultado
        if [ "$HTTP_CODE" == "204" ] || [ "$HTTP_CODE" == "200" ]; then
          echo "✅ Aplicación en Runtime Manager borrada correctamente"
          echo "Esperando 20 segundos para asegurar que se complete el borrado..."
          sleep 20
        elif [ "$HTTP_CODE" == "404" ]; then
          echo "ℹ️ No se encontró la aplicación en Runtime Manager o ya fue borrada"
        else
          echo "⚠️ Error al borrar la aplicación en Runtime Manager: HTTP $HTTP_CODE"
          echo "Respuesta: $(echo "$RESULTADO" | head -n -1)"
          echo "Intentando borrar con el endpoint alternativo para Cloudhub 1.0..."
          
          # Intento alternativo para Cloudhub 1.0
          RESULTADO2=$(curl -s -u "${{ secrets.ANYPOINT_PLATFORM_USERNAME }}:${{ secrets.ANYPOINT_PLATFORM_PASSWORD }}" \
            -X DELETE \
            -w "\n%{http_code}" \
            "https://anypoint.mulesoft.com/cloudhub/api/applications/s-test-svalerdos")
          
          HTTP_CODE2=$(echo "$RESULTADO2" | tail -n1)
          
          if [ "$HTTP_CODE2" == "204" ] || [ "$HTTP_CODE2" == "200" ]; then
            echo "✅ Aplicación en Runtime Manager (Cloudhub 1.0) borrada correctamente"
            echo "Esperando 20 segundos para asegurar que se complete el borrado..."
            sleep 20
          elif [ "$HTTP_CODE2" == "404" ]; then
            echo "ℹ️ No se encontró la aplicación en Runtime Manager (Cloudhub 1.0)"
          else
            echo "⚠️ Error al borrar la aplicación en Runtime Manager (Cloudhub 1.0): HTTP $HTTP_CODE2"
            echo "Respuesta: $(echo "$RESULTADO2" | head -n -1)"
            echo "Continuando con el despliegue de todos modos..."
          fi
        fi
    
    # Desplegar nueva aplicación
    - name: Desplegar a Sandbox
      run: |
        echo "Desplegando aplicación..."
        mvn deploy -DmuleDeploy -DskipDeploymentVerification=true \
        -DskipMuleVersionCompatibilityCheck=true \
        -Dmule.artifact.deploy.muleVersion=4.6.0 \
        -Danypoint.username="${{ secrets.ANYPOINT_PLATFORM_USERNAME }}" \
        -Danypoint.password="${{ secrets.ANYPOINT_PLATFORM_PASSWORD }}" \
        -Dencryption.key="${{ secrets.ENCRYPTION_KEY }}"