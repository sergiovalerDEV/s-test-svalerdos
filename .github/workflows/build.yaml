name: Build and Deploy to Sandbox  
on:   
  push:     
    branches: [ master ]   
  pull_request:     
    branches: [ master ]      

jobs:   
  build:     
    runs-on: ubuntu-latest     
    steps:     
    - name: Checkout this repo       
      uses: actions/checkout@v4     
    - name: Cache dependencies       
      uses: actions/cache@v4       
      with:         
        path: ~/.m2/repository         
        key: ${{ runner.os }}-maven-${{ hashFiles('**/pom.xml') }}         
        restore-keys: |           
          ${{ runner.os }}-maven-     
    - name: Set up JDK 1.8       
      uses: actions/setup-java@v4       
      with:         
        distribution: 'zulu'         
        java-version: 8  
    - name: Configure Maven settings
      run: |
        mkdir -p ~/.m2
        echo "<settings>
          <servers>
            <server>
              <id>anypoint-exchange-v3</id>
              <username>${{ secrets.ANYPOINT_PLATFORM_USERNAME }}</username>
              <password>${{ secrets.ANYPOINT_PLATFORM_PASSWORD }}</password>
            </server>
          </servers>
        </settings>" > ~/.m2/settings.xml
    - name: Build with Maven  
      run: mvn -B clean package --file pom.xml
    - name: Upload artifact        
      uses: actions/upload-artifact@v4       
      with:           
        name: artifacts           
        path: target/*.jar            

  deploy:     
    needs: build     
    runs-on: ubuntu-latest     
    steps:         
    - name: Checkout this repo       
      uses: actions/checkout@v4     
    - name: Set up Maven 3.6.3
      uses: stCarolas/setup-maven@v4.5
      with:
        maven-version: 3.6.3
    - name: Set up JDK 1.8       
      uses: actions/setup-java@v4       
      with:         
        distribution: 'zulu'         
        java-version: 8
    - name: Cache dependencies       
      uses: actions/cache@v4       
      with:         
        path: ~/.m2/repository         
        key: ${{ runner.os }}-maven-${{ hashFiles('**/pom.xml') }}         
        restore-keys: |           
          ${{ runner.os }}-maven-     
    - name: Download artifacts
      uses: actions/download-artifact@v4       
      with:         
        name: artifacts
        path: target/
    - name: Configure Maven settings
      run: |
        mkdir -p ~/.m2
        echo "<settings>
          <servers>
            <server>
              <id>anypoint-exchange-v3</id>
              <username>${{ secrets.ANYPOINT_PLATFORM_USERNAME }}</username>
              <password>${{ secrets.ANYPOINT_PLATFORM_PASSWORD }}</password>
            </server>
          </servers>
        </settings>" > ~/.m2/settings.xml
    
    # Desplegar con parámetros avanzados para evitar errores de versión
    - name: Desplegar a Sandbox con parámetros avanzados
      run: |
        echo "Desplegando aplicación con parámetros avanzados..."
        mvn deploy -DmuleDeploy \
        -DskipDeploymentVerification=true \
        -DskipMuleVersionCompatibilityCheck=true \
        -DignoreVersionConflict=true \
        -DforceStopApplicationOnRedeploy=true \
        -DforceUpdatePomFile=true \
        -DskipValidation=true \
        -Dmule.artifact.deploy.muleVersion=4.9.0 \
        -Danypoint.platform.client_id="${{ secrets.ANYPOINT_PLATFORM_USERNAME }}" \
        -Danypoint.platform.client_secret="${{ secrets.ANYPOINT_PLATFORM_PASSWORD }}" \
        -Danypoint.username="${{ secrets.ANYPOINT_PLATFORM_USERNAME }}" \
        -Danypoint.password="${{ secrets.ANYPOINT_PLATFORM_PASSWORD }}" \
        -Dencryption.key="${{ secrets.ENCRYPTION_KEY }}" \
        -Danypoint.platform.base_uri=https://anypoint.mulesoft.com \
        -Danypoint.platform.analytics_base_uri=https://analytics-ingest.anypoint.mulesoft.com \
        -Danypoint.platform.gatekeeper=false