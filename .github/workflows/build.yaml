name: Build and Deploy to Sandbox  
on:   
  push:     
    branches: [ master ]   
  pull_request:     
    branches: [ master ]      

jobs:   
  build:     
    runs-on: ubuntu-latest     
    steps:     
    - name: Checkout this repo       
      uses: actions/checkout@v4     
    - name: Cache dependencies       
      uses: actions/cache@v4       
      with:         
        path: ~/.m2/repository         
        key: ${{ runner.os }}-maven-${{ hashFiles('**/pom.xml') }}         
        restore-keys: |           
          ${{ runner.os }}-maven-     
    - name: Set up JDK 1.8       
      uses: actions/setup-java@v4       
      with:         
        distribution: 'zulu'         
        java-version: 8  
    - name: Configure Maven settings
      run: |
        mkdir -p ~/.m2
        echo "<settings>
          <servers>
            <server>
              <id>anypoint-exchange-v3</id>
              <username>${{ secrets.ANYPOINT_PLATFORM_USERNAME }}</username>
              <password>${{ secrets.ANYPOINT_PLATFORM_PASSWORD }}</password>
            </server>
          </servers>
        </settings>" > ~/.m2/settings.xml
    - name: Build with Maven  
      run: mvn -B clean package --file pom.xml
    - name: Upload artifact        
      uses: actions/upload-artifact@v4       
      with:           
        name: artifacts           
        path: target/*.jar            

  deploy:     
    needs: build     
    runs-on: ubuntu-latest     
    steps:         
    - name: Checkout this repo       
      uses: actions/checkout@v4     
    - name: Set up JDK 1.8       
      uses: actions/setup-java@v4       
      with:         
        distribution: 'zulu'         
        java-version: 8
    - name: Cache dependencies       
      uses: actions/cache@v4       
      with:         
        path: ~/.m2/repository         
        key: ${{ runner.os }}-maven-${{ hashFiles('**/pom.xml') }}         
        restore-keys: |           
          ${{ runner.os }}-maven-     
    - name: Download artifacts
      uses: actions/download-artifact@v4       
      with:         
        name: artifacts
        path: target/
    - name: Configure Maven settings
      run: |
        mkdir -p ~/.m2
        echo "<settings>
          <servers>
            <server>
              <id>anypoint-exchange-v3</id>
              <username>${{ secrets.ANYPOINT_PLATFORM_USERNAME }}</username>
              <password>${{ secrets.ANYPOINT_PLATFORM_PASSWORD }}</password>
            </server>
          </servers>
        </settings>" > ~/.m2/settings.xml
    
    # Borrar aplicación existente (versión corregida)
    - name: Borrar aplicación existente
      run: |
        # Instalar jq para procesar JSON
        sudo apt-get update && sudo apt-get install -y jq
        
        # Obtener token con las credenciales existentes (con mejor manejo de errores)
        echo "Obteniendo token de acceso..."
        AUTH_RESPONSE=$(curl -s -X POST \
          https://anypoint.mulesoft.com/accounts/api/v2/oauth2/token \
          -H "Content-Type: application/x-www-form-urlencoded" \
          -d "username=${{ secrets.ANYPOINT_PLATFORM_USERNAME }}&password=${{ secrets.ANYPOINT_PLATFORM_PASSWORD }}&grant_type=password")
        
        # Verificar si la respuesta es un JSON válido
        echo "Verificando respuesta de autenticación..."
        if echo "$AUTH_RESPONSE" | jq -e . >/dev/null 2>&1; then
          # La respuesta es un JSON válido, intentar extraer el token
          TOKEN=$(echo "$AUTH_RESPONSE" | jq -r '.access_token // empty')
          
          if [ -n "$TOKEN" ]; then
            echo "Token obtenido correctamente"
            
            # Borrar aplicación
            echo "Borrando aplicación existente..."
            DELETE_RESPONSE=$(curl -s -X DELETE \
              "https://anypoint.mulesoft.com/cloudhub/api/v2/organizations/153b0d20-821e-4f82-b36a-7e0e28e44a93/environments/e5d7feb4-a658-436e-8915-5c79b9e15da9/applications/s-test-svalerdos" \
              -H "Authorization: Bearer $TOKEN" \
              -w "\n%{http_code}")
            
            # Extraer código HTTP
            HTTP_CODE=$(echo "$DELETE_RESPONSE" | tail -n1)
            
            # Verificar resultado
            if [ "$HTTP_CODE" == "204" ] || [ "$HTTP_CODE" == "200" ]; then
              echo "✅ Aplicación borrada correctamente"
              echo "Esperando 20 segundos para asegurar que se complete el borrado..."
              sleep 20
            elif [ "$HTTP_CODE" == "404" ]; then
              echo "ℹ️ La aplicación no existe o ya fue borrada"
            else
              echo "⚠️ Error al borrar la aplicación: HTTP $HTTP_CODE"
              echo "Respuesta: $(echo "$DELETE_RESPONSE" | head -n -1)"
            fi
          else
            echo "⚠️ No se pudo extraer el token de acceso. Respuesta: $AUTH_RESPONSE"
            echo "Continuando con el despliegue sin borrar la aplicación existente..."
          fi
        else
          echo "⚠️ La respuesta de autenticación no es un JSON válido: $AUTH_RESPONSE"
          echo "Continuando con el despliegue sin borrar la aplicación existente..."
        fi
    
    # Desplegar nueva aplicación
    - name: Desplegar a Sandbox
      run: |
        echo "Desplegando aplicación..."
        mvn deploy -DmuleDeploy -DskipDeploymentVerification=true \
        -DskipMuleVersionCompatibilityCheck=true \
        -Dmule.artifact.deploy.muleVersion=4.6.0 \
        -Danypoint.username="${{ secrets.ANYPOINT_PLATFORM_USERNAME }}" \
        -Danypoint.password="${{ secrets.ANYPOINT_PLATFORM_PASSWORD }}" \
        -Dencryption.key="${{ secrets.ENCRYPTION_KEY }}"